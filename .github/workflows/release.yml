name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package artifact
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.TrimStart("v")
          $hostLine = rustc -vV | Where-Object { $_ -like "host:*" }
          $targetTriple = ($hostLine -replace "host:\s*", "").Trim()
          $packageName = "nohupx-$version-$targetTriple"
          $packageDir = Join-Path "dist" $packageName

          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "README.md" $packageDir

          if ($IsWindows) {
            Copy-Item "target/release/nohupx.exe" $packageDir
            $archive = Join-Path "dist" "$packageName.zip"
            Compress-Archive -Path $packageDir -DestinationPath $archive -Force
          } else {
            Copy-Item "target/release/nohupx" $packageDir
            chmod +x (Join-Path $packageDir "nohupx")
            $archive = Join-Path "dist" "$packageName.tar.gz"
            tar -czf $archive -C "dist" $packageName
          }

          $hash = Get-FileHash -Algorithm SHA256 $archive
          $hashText = "$($hash.Hash.ToLower())  $(Split-Path $archive -Leaf)"
          Set-Content -Path "$archive.sha256" -Value $hashText

          Get-ChildItem "dist" -File | ForEach-Object {
            Write-Host "Created $($_.FullName)"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show artifacts
        run: ls -lah dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG"
          fi
